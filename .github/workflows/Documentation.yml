name: Documentation

on:
  push:
    branches:
      - main
    tags: '*'
  pull_request:
  release:

concurrency:
    group: doc-build-pipeline
    cancel-in-progress: ${{ !contains(github.ref, 'main')}}

jobs:
  BuildManual:
    runs-on: ubuntu-latest
    strategy:
        matrix:
            folder: [howto/dataviz, howto/generation, howto/layers, howto/polygons, howto/retrieval, howto/sdm, howto/usage, tutorials/sdm, tutorials/usage]
    steps:
      - uses: actions/checkout@v4
      - name: Prepare the artifact name
        id: prep_artifact_name
        run: |
            if [ "${{ matrix.folder }}" != "" ] ; then
                name="${{ matrix.folder }}"
            fi
            name=$(echo -n "$name" | sed -e 's/[ \t:\/\\"<>|*?]/-/g' -e 's/--*/-/g')
            echo "ARTIFACT_NAME=$name" >> $GITHUB_ENV
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1'
      - name: "Bootstrap the package"
        run: julia --project=. bootstrap.jl
      - uses: julia-actions/cache@v2
      - name: Install dependencies
        run: julia --project=docs/ -e 'using Pkg; Pkg.develop(PackageSpec(path=pwd())); Pkg.instantiate()'
      - name: Build and deploy
        env:
          NODE_OPTIONS: "--max_old_space_size=4096"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DOCUMENTER_KEY: ${{ secrets.DOCUMENTER_KEY }}
          DATADEPS_ALWAYS_ACCEPT: true
        run: julia --project=docs/ --threads=auto docs/build.jl ${{ matrix.folder }}
      - name: "Upload the folder ${{ matrix.folder }}"
        uses: actions/upload-artifact@v4
        with:
          path: |
            docs/src/howto
            docs/src/tutorials
          name: build-${{ env.ARTIFACT_NAME }}
  OccurrencesInterface:
    permissions:
      actions: write
      contents: write
      pull-requests: read
      statuses: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1'
      - name: "Bootstrap the package"
        run: julia --project=./OccurrencesInterface OccurrencesInterface/bootstrap.jl
      - uses: julia-actions/cache@v2
      - name: Install dependencies
        run: julia --project=docs/ -e 'using Pkg; Pkg.develop(PackageSpec(path=pwd())); Pkg.instantiate()'
        working-directory: OccurrencesInterface/
      - name: Build and deploy
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DOCUMENTER_KEY: ${{ secrets.DOCUMENTER_KEY }}
        run: julia --project=OccurrencesInterface/docs/ OccurrencesInterface/docs/make.jl
  GBIF:
